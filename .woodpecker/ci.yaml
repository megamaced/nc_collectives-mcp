when:
  - event: [push, pull_request, manual]

steps:
  install:
    image: node:24-alpine
    commands:
      - corepack enable
      - pnpm install --frozen-lockfile

  lint:
    image: node:24-alpine
    depends_on: [install]
    commands:
      - corepack enable
      - pnpm lint

  typecheck:
    image: node:24-alpine
    depends_on: [install]
    commands:
      - corepack enable
      - pnpm typecheck

  build:
    image: node:24-alpine
    depends_on: [install]
    commands:
      - corepack enable
      - pnpm build
